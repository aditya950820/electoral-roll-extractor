services:
  electoral-roll:
    build: .
    container_name: electoral-roll
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      # Random string that signs session cookies; any value works, keep it stable.
      APP_SESSION_SECRET: ${APP_SESSION_SECRET}
      OCR_PROVIDER: ${OCR_PROVIDER:-mistral}
      OCR_MODEL: ${OCR_MODEL:-mistral-ocr-latest}
      STRUCTURE_MODEL: ${STRUCTURE_MODEL:-mistral-small-latest}
